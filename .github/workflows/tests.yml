name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fixtures:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fixture harness (PowerShell 7)
        shell: pwsh
        run: pwsh -File .\tests\Run-Fixtures.ps1

      - name: Fixture harness (Windows PowerShell 5.1)
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\tests\Run-Fixtures.ps1
